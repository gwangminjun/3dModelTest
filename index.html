<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>자연 훼손 시뮬레이터</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Loading -->
  <div id="loading">
    <div id="loading-text">GLB 파일을 불러오세요</div>
    <a id="sample-btn" href="model/model.glb" download="model.glb">예시 파일 다운로드 (model.glb)</a>
    <button id="file-btn">GLB 파일 선택</button>
    <input type="file" id="file-input" accept=".glb,.gltf" />
  </div>

  <!-- Control Panel -->
  <div id="panel">
    <h3>자연 훼손 시뮬레이터</h3>

    <div class="sec">
      <div class="sec-title">날씨 효과</div>
      <div class="rg">
        <label><input type="radio" name="weather" value="none" checked> 없음</label>
        <label><input type="radio" name="weather" value="rain"> 비</label>
        <label><input type="radio" name="weather" value="wind"> 바람</label>
        <label><input type="radio" name="weather" value="both"> 비+바람</label>
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">강도</div>
      <input type="range" id="intensity" min="1" max="100" value="50" />
      <div class="range-labels"><span>약</span><span id="intensity-val">50</span><span>강</span></div>
    </div>

    <div class="sec">
      <div class="sec-title">변형 효과</div>
      <div class="deform-hint">미체크: 날씨 강도 자동 연동<br>체크: 수동 값 지정</div>
      <div class="deform-row">
        <label><input type="checkbox" id="bend-chk"> 휘어짐</label>
        <div class="num-wrap">
          <input type="number" id="bend-val" value="0" min="0" max="100" disabled />
          <span class="unit">/ 100</span>
          <span class="auto-badge" id="bend-auto">AUTO</span>
        </div>
      </div>
      <div class="deform-row">
        <label><input type="checkbox" id="twist-chk"> 비틀림</label>
        <div class="num-wrap">
          <input type="number" id="twist-val" value="0" min="0" max="100" disabled />
          <span class="unit">/ 100</span>
          <span class="auto-badge" id="twist-auto">AUTO</span>
        </div>
      </div>
    </div>

    <button id="reset-btn">↺ 초기화</button>
  </div>

  <div id="hint">마우스: 회전 &nbsp;|&nbsp; 휠: 줌 &nbsp;|&nbsp; 우클릭: 이동</div>
  <div id="drop-overlay"><span>GLB 파일을 여기에 놓으세요</span></div>

  <script type="importmap">
  {
    "imports": {
      "three": "./node_modules/three/build/three.module.js",
      "three/addons/": "./node_modules/three/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';

    // ── Renderer ──────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    document.body.appendChild(renderer.domElement);

    // ── Scene ─────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);
    scene.fog = new THREE.FogExp2(0x1a1a2e, 0.018);

    // ── Camera ────────────────────────────────────────────────────
    const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.01, 500);
    camera.position.set(0, 2, 5);

    // ── Controls ──────────────────────────────────────────────────
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 0.5;
    controls.maxDistance = 100;

    // ── Lights ────────────────────────────────────────────────────
    const ambient  = new THREE.AmbientLight(0xffffff, 0.6);
    const sunLight = new THREE.DirectionalLight(0xffffff, 1.5);
    sunLight.position.set(5, 10, 7);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.set(2048, 2048);
    const fillLight = new THREE.DirectionalLight(0x8899ff, 0.4);
    fillLight.position.set(-5, 2, -5);
    scene.add(ambient, sunLight, fillLight);

    // ── Grid ──────────────────────────────────────────────────────
    const grid = new THREE.GridHelper(30, 60, 0x444466, 0x333355);
    grid.material.opacity = 0.4;
    grid.material.transparent = true;
    scene.add(grid);

    // ── Shared Deform Uniforms ────────────────────────────────────
    // Both references are shared across all mesh shader instances.
    // Changing .value here updates all meshes on the next render.
    const uBend   = { value: 0.0 };   // 0–100 bend  strength
    const uTwist  = { value: 0.0 };   // 0–100 twist strength
    const uModelH = { value: 2.0 };   // scaled model height (set after load)

    function injectDeform(mat) {
      mat.onBeforeCompile = (shader) => {
        shader.uniforms.uBend   = uBend;
        shader.uniforms.uTwist  = uTwist;
        shader.uniforms.uModelH = uModelH;

        shader.vertexShader =
          'uniform float uBend;\nuniform float uTwist;\nuniform float uModelH;\n' +
          shader.vertexShader.replace(
            '#include <begin_vertex>',
            `#include <begin_vertex>
            // Normalised height (0 = base, 1 = top)
            float ht = clamp(transformed.y / max(uModelH, 0.001), 0.0, 1.5);

            // ── Bend: X displacement grows quadratically with height ──
            transformed.x += uBend * 0.015 * ht * ht;

            // ── Twist: Y-axis rotation grows linearly with height ──
            float angle = uTwist * 0.015 * ht;
            float c = cos(angle); float s = sin(angle);
            float nx = transformed.x * c - transformed.z * s;
            float nz = transformed.x * s + transformed.z * c;
            transformed.x = nx; transformed.z = nz;`
          );
      };
      mat.needsUpdate = true;
    }

    // ── GLB Loader ────────────────────────────────────────────────
    const loader = new GLTFLoader();
    let currentModel = null;
    let initCamPos = null, initCamTarget = null;

    function placeModel(gltf) {
      if (currentModel) { scene.remove(currentModel); currentModel = null; window._mixer = null; }
      const model = gltf.scene;
      currentModel = model;

      model.traverse(child => {
        if (!child.isMesh) return;
        child.castShadow = true;
        child.receiveShadow = true;
        (Array.isArray(child.material) ? child.material : [child.material])
          .forEach(injectDeform);
      });

      const box    = new THREE.Box3().setFromObject(model);
      const size   = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const scale  = 2.0 / Math.max(size.x, size.y, size.z);
      model.scale.setScalar(scale);
      model.position.set(-center.x * scale, -box.min.y * scale, -center.z * scale);

      uModelH.value = size.y * scale;
      scene.add(model);

      const h = uModelH.value;
      initCamPos    = new THREE.Vector3(0, h * 0.8, h * 2.8);
      initCamTarget = new THREE.Vector3(0, h * 0.4, 0);
      camera.position.copy(initCamPos);
      controls.target.copy(initCamTarget);
      controls.update();

      if (gltf.animations?.length) {
        const mixer = new THREE.AnimationMixer(model);
        gltf.animations.forEach(c => mixer.clipAction(c).play());
        window._mixer = mixer;
      }
      document.getElementById('loading').style.display = 'none';
    }

    function loadGLB(src) {
      document.getElementById('loading-text').textContent = 'Loading...';
      document.getElementById('sample-btn').style.display = 'none';
      document.getElementById('file-btn').style.display = 'none';
      loader.load(src, placeModel,
        p => { if (p.total > 0) document.getElementById('loading-text').textContent = `Loading... ${Math.round(p.loaded/p.total*100)}%`; },
        err => {
          console.error(err);
          document.getElementById('loading-text').textContent = '불러오기 실패. 다시 시도해주세요.';
          document.getElementById('sample-btn').style.display = 'inline-block';
          document.getElementById('file-btn').style.display = 'inline-block';
        }
      );
    }

    function loadFromFile(file) { const r = new FileReader(); r.onload = e => loadGLB(e.target.result); r.readAsDataURL(file); }
    document.getElementById('file-btn').onclick    = () => document.getElementById('file-input').click();
    document.getElementById('file-input').onchange = e  => { if (e.target.files[0]) loadFromFile(e.target.files[0]); };
    const overlay = document.getElementById('drop-overlay');
    document.addEventListener('dragover',  e => { e.preventDefault(); overlay.style.display = 'block'; });
    document.addEventListener('dragleave', e => { if (!e.relatedTarget) overlay.style.display = 'none'; });
    document.addEventListener('drop', e => {
      e.preventDefault(); overlay.style.display = 'none';
      const f = e.dataTransfer.files[0];
      if (f && (f.name.endsWith('.glb') || f.name.endsWith('.gltf'))) loadFromFile(f);
    });

    // ── Weather Particles ─────────────────────────────────────────
    const RANGE = 14, CEIL = 12;
    let weatherType = 'none', intensity = 0.5;

    // Rain
    const RAIN_N = 4000;
    const rPos = new Float32Array(RAIN_N * 3), rSpd = new Float32Array(RAIN_N);
    for (let i = 0; i < RAIN_N; i++) {
      rPos[i*3]   = (Math.random()-0.5)*RANGE*2;
      rPos[i*3+1] = Math.random()*CEIL;
      rPos[i*3+2] = (Math.random()-0.5)*RANGE*2;
      rSpd[i] = 0.06 + Math.random()*0.1;
    }
    const rainGeo  = new THREE.BufferGeometry();
    rainGeo.setAttribute('position', new THREE.BufferAttribute(rPos, 3));
    const rainMat  = new THREE.PointsMaterial({ color: 0xaaddff, size: 0.05, transparent: true, opacity: 0.55, depthWrite: false });
    const rainMesh = new THREE.Points(rainGeo, rainMat);
    rainMesh.visible = false;
    scene.add(rainMesh);

    // Wind (dust / debris)
    const WIND_N = 2000;
    const wPos = new Float32Array(WIND_N * 3), wSpd = new Float32Array(WIND_N), wPhs = new Float32Array(WIND_N);
    for (let i = 0; i < WIND_N; i++) {
      wPos[i*3]   = (Math.random()-0.5)*RANGE*2;
      wPos[i*3+1] = Math.random()*CEIL*0.55;
      wPos[i*3+2] = (Math.random()-0.5)*RANGE*2;
      wSpd[i] = 0.04 + Math.random()*0.08;
      wPhs[i] = Math.random()*Math.PI*2;
    }
    const windGeo  = new THREE.BufferGeometry();
    windGeo.setAttribute('position', new THREE.BufferAttribute(wPos, 3));
    const windMat  = new THREE.PointsMaterial({ color: 0xd4b07a, size: 0.08, transparent: true, opacity: 0.5, depthWrite: false });
    const windMesh = new THREE.Points(windGeo, windMat);
    windMesh.visible = false;
    scene.add(windMesh);

    function tickParticles() {
      const hasRain = weatherType==='rain'||weatherType==='both';
      const hasWind = weatherType==='wind'||weatherType==='both';
      const sp = intensity, t = performance.now()*0.001;
      const wAngle = Math.sin(t*0.25)*0.4 + 0.2;

      rainMesh.visible = hasRain;
      windMesh.visible = hasWind;

      if (hasRain) {
        for (let i = 0; i < RAIN_N; i++) {
          rPos[i*3+1] -= rSpd[i] * (sp*1.6 + 0.4);
          if (hasWind) rPos[i*3] += wAngle * sp * 0.05;
          if (rPos[i*3+1] < -0.3) {
            rPos[i*3]   = (Math.random()-0.5)*RANGE*2;
            rPos[i*3+1] = CEIL + Math.random()*2;
            rPos[i*3+2] = (Math.random()-0.5)*RANGE*2;
          }
        }
        rainGeo.attributes.position.needsUpdate = true;
        rainMat.opacity = 0.3 + sp*0.45;
      }

      if (hasWind) {
        for (let i = 0; i < WIND_N; i++) {
          wPos[i*3]   += wSpd[i] * (sp*1.6 + 0.3);
          wPos[i*3+1] += Math.sin(t*1.2 + wPhs[i]) * 0.015 * sp;
          if (wPos[i*3] > RANGE) {
            wPos[i*3]   = -RANGE;
            wPos[i*3+1] = Math.random()*CEIL*0.55;
            wPos[i*3+2] = (Math.random()-0.5)*RANGE*2;
          }
        }
        windGeo.attributes.position.needsUpdate = true;
        windMat.opacity = 0.3 + sp*0.4;
      }
    }

    // ── Auto Deform Targets from Weather + Intensity ───────────────
    // 비    → bend 강  / twist 약
    // 바람  → bend 중  / twist 강
    // 비+바람 → 모두 강
    function calcAutoTargets() {
      const sp = intensity;
      const hasRain = weatherType==='rain' || weatherType==='both';
      const hasWind = weatherType==='wind' || weatherType==='both';
      let bend = 0, twist = 0;
      if (hasRain) bend  += sp * 58;
      if (hasWind) { bend += sp * 22; twist += sp * 55; }
      return { bend: Math.min(bend, 100), twist: Math.min(twist, 100) };
    }

    // ── Atmosphere ────────────────────────────────────────────────
    const clearBg = new THREE.Color(0x1a1a2e);
    const stormBg = new THREE.Color(0x07070f);

    function updateAtmosphere() {
      const stormy = weatherType !== 'none';
      scene.background.lerp(stormy ? stormBg : clearBg, 0.03);
      scene.fog.color.lerp(stormy ? stormBg : clearBg, 0.03);
      scene.fog.density  = THREE.MathUtils.lerp(scene.fog.density,  stormy ? 0.038 : 0.018, 0.03);
      sunLight.intensity = THREE.MathUtils.lerp(sunLight.intensity, stormy ? 0.50  : 1.5,   0.04);
      ambient.intensity  = THREE.MathUtils.lerp(ambient.intensity,  stormy ? 0.20  : 0.6,   0.04);
    }

    // ── UI References ─────────────────────────────────────────────
    const bendChk    = document.getElementById('bend-chk');
    const twistChk   = document.getElementById('twist-chk');
    const bendInput  = document.getElementById('bend-val');
    const twistInput = document.getElementById('twist-val');
    const bendAuto   = document.getElementById('bend-auto');
    const twistAuto  = document.getElementById('twist-auto');
    const intensitySlider = document.getElementById('intensity');

    // ── UI Events ─────────────────────────────────────────────────
    document.querySelectorAll('input[name="weather"]').forEach(r =>
      r.addEventListener('change', e => { weatherType = e.target.value; })
    );

    intensitySlider.addEventListener('input', e => {
      intensity = e.target.value / 100;
      document.getElementById('intensity-val').textContent = e.target.value;
    });

    bendChk.addEventListener('change', () => {
      const manual = bendChk.checked;
      bendInput.disabled   = !manual;
      bendAuto.style.display = manual ? 'none' : 'inline';
      if (manual) { bendInput.value = Math.round(uBend.value); uBend.value = parseFloat(bendInput.value)||0; }
    });
    twistChk.addEventListener('change', () => {
      const manual = twistChk.checked;
      twistInput.disabled   = !manual;
      twistAuto.style.display = manual ? 'none' : 'inline';
      if (manual) { twistInput.value = Math.round(uTwist.value); uTwist.value = parseFloat(twistInput.value)||0; }
    });

    bendInput.addEventListener('input',  () => { if (bendChk.checked)  uBend.value  = parseFloat(bendInput.value)  || 0; });
    twistInput.addEventListener('input', () => { if (twistChk.checked) uTwist.value = parseFloat(twistInput.value) || 0; });

    // ── Reset ─────────────────────────────────────────────────────
    document.getElementById('reset-btn').addEventListener('click', () => {
      // Weather
      document.querySelector('input[name="weather"][value="none"]').checked = true;
      weatherType = 'none';

      // Intensity
      intensitySlider.value = 50; intensity = 0.5;
      document.getElementById('intensity-val').textContent = '50';

      // Deform — uncheck, disable, reset values
      bendChk.checked  = false; bendInput.disabled  = true; bendInput.value  = 0; bendAuto.style.display  = 'none';
      twistChk.checked = false; twistInput.disabled = true; twistInput.value = 0; twistAuto.style.display = 'none';

      // Uniforms (lerp back to 0 smoothly via auto path)
      uBend.value = 0; uTwist.value = 0;

      // Camera
      if (initCamPos) { camera.position.copy(initCamPos); controls.target.copy(initCamTarget); controls.update(); }
    });

    // ── Resize ────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    // ── Render Loop ───────────────────────────────────────────────
    const clock = new THREE.Clock();
    (function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();
      if (window._mixer) window._mixer.update(dt);
      controls.update();
      tickParticles();
      updateAtmosphere();

      // Deform: manual override OR smooth auto from weather intensity
      const tgt = calcAutoTargets();
      if (bendChk.checked) {
        // manual — value already set via input event, just clamp
        uBend.value = Math.max(0, Math.min(100, uBend.value));
      } else {
        uBend.value = THREE.MathUtils.lerp(uBend.value, tgt.bend,  0.025);
        bendInput.value = Math.round(uBend.value);
        bendAuto.style.display = weatherType !== 'none' ? 'inline' : 'none';
      }
      if (twistChk.checked) {
        uTwist.value = Math.max(0, Math.min(100, uTwist.value));
      } else {
        uTwist.value = THREE.MathUtils.lerp(uTwist.value, tgt.twist, 0.025);
        twistInput.value = Math.round(uTwist.value);
        twistAuto.style.display = weatherType !== 'none' ? 'inline' : 'none';
      }

      renderer.render(scene, camera);
    })();
  </script>
</body>
</html>
