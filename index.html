<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>건물 훼손 시뮬레이터</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Loading -->
  <div id="loading">
    <div id="loading-text">GLB 파일을 불러오세요</div>
    <a id="sample-btn" href="model/model.glb" download="model.glb">예시 파일 다운로드 (model.glb)</a>
    <button id="file-btn">GLB 파일 선택</button>
    <input type="file" id="file-input" accept=".glb,.gltf" />
  </div>

  <!-- Control Panel -->
  <div id="panel">
    <h3>건물 훼손 시뮬레이터</h3>

    <div class="sec">
      <div class="sec-title">날씨</div>
      <div class="rg">
        <label><input type="radio" name="weather" value="none"  checked> 없음</label>
        <label><input type="radio" name="weather" value="rain">  비</label>
        <label><input type="radio" name="weather" value="wind">  강풍</label>
        <label><input type="radio" name="weather" value="quake"> 지진</label>
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">강도</div>
      <input type="range" id="intensity" min="1" max="100" value="50" />
      <div class="range-labels"><span>약</span><span id="intensity-val">50</span><span>강</span></div>
    </div>

    <!-- 모드 토글 -->
    <div class="mode-toggle">
      <button id="tab-manual" class="tab active">수동 변형</button>
      <button id="tab-sim"    class="tab">시뮬레이션</button>
    </div>

    <!-- 수동 변형 패널 -->
    <div id="panel-manual" class="sec mode-panel">
      <div class="deform-hint">미체크: 날씨 강도 자동 연동<br>체크: 수동 값 지정</div>
      <div class="deform-row">
        <label><input type="checkbox" id="crack-chk"> 균열</label>
        <div class="num-wrap">
          <input type="number" id="crack-val" value="0" min="0" max="1000" disabled />
          <span class="unit">/ 1000</span>
          <span class="auto-badge" id="crack-auto">AUTO</span>
        </div>
      </div>
      <div class="deform-row">
        <label><input type="checkbox" id="collapse-chk"> 붕괴</label>
        <div class="num-wrap">
          <input type="number" id="collapse-val" value="0" min="0" max="1000" disabled />
          <span class="unit">/ 1000</span>
          <span class="auto-badge" id="collapse-auto">AUTO</span>
        </div>
      </div>
      <div class="deform-row">
        <label><input type="checkbox" id="sink-chk"> 침하</label>
        <div class="num-wrap">
          <input type="number" id="sink-val" value="0" min="0" max="1000" disabled />
          <span class="unit">/ 1000</span>
          <span class="auto-badge" id="sink-auto">AUTO</span>
        </div>
      </div>
      <div class="deform-row">
        <label><input type="checkbox" id="age-chk"> 노화</label>
        <div class="num-wrap">
          <input type="number" id="age-val" value="0" min="0" max="1000" disabled />
          <span class="unit">/ 1000</span>
          <span class="auto-badge" id="age-auto">AUTO</span>
        </div>
      </div>
    </div>

    <!-- 시뮬레이션 패널 -->
    <div id="panel-sim" class="sec mode-panel" style="display:none;">
      <div class="deform-hint">목표값까지 지정 시간 동안 진행</div>
      <div class="deform-row">
        <label class="sim-target-label">균열</label>
        <div class="num-wrap">
          <input type="number" id="sim-crack-target"    value="0" min="0" max="1000" />
          <span class="unit">/ 1000</span>
        </div>
      </div>
      <div class="deform-row">
        <label class="sim-target-label">붕괴</label>
        <div class="num-wrap">
          <input type="number" id="sim-collapse-target" value="0" min="0" max="1000" />
          <span class="unit">/ 1000</span>
        </div>
      </div>
      <div class="deform-row">
        <label class="sim-target-label">침하</label>
        <div class="num-wrap">
          <input type="number" id="sim-sink-target"     value="0" min="0" max="1000" />
          <span class="unit">/ 1000</span>
        </div>
      </div>
      <div class="deform-row">
        <label class="sim-target-label">노화</label>
        <div class="num-wrap">
          <input type="number" id="sim-age-target"      value="0" min="0" max="1000" />
          <span class="unit">/ 1000</span>
        </div>
      </div>
      <div class="sim-row" style="margin-top:10px;">
        <span class="sim-label">진행 시간</span>
        <input type="number" id="sim-duration" value="30" min="1" max="3600" />
        <span class="unit">초</span>
      </div>
      <div class="sim-progress-wrap">
        <div id="sim-progress-bar"></div>
      </div>
      <div class="sim-time-display">
        <span id="sim-time-cur">0</span> / <span id="sim-time-total">30</span>초
      </div>
      <div class="sim-controls">
        <button id="sim-play-btn">▶ 재생</button>
        <button id="sim-reset-btn">↺ 리셋</button>
      </div>
    </div>

    <button id="reset-btn">↺ 전체 초기화</button>
  </div>

  <div id="hint">마우스: 회전 &nbsp;|&nbsp; 휠: 줌 &nbsp;|&nbsp; 우클릭: 이동</div>
  <div id="drop-overlay"><span>GLB 파일을 여기에 놓으세요</span></div>

  <script type="importmap">
  {
    "imports": {
      "three": "./node_modules/three/build/three.module.js",
      "three/addons/": "./node_modules/three/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';

    // ── Renderer ──────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    document.body.appendChild(renderer.domElement);

    // ── Scene ─────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);
    scene.fog = new THREE.FogExp2(0x1a1a2e, 0.018);

    // ── Camera ────────────────────────────────────────────────────
    const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.01, 500);
    camera.position.set(0, 2, 5);

    // ── Controls ──────────────────────────────────────────────────
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 0.5;
    controls.maxDistance = 100;

    // ── Lights ────────────────────────────────────────────────────
    const ambient  = new THREE.AmbientLight(0xffffff, 0.6);
    const sunLight = new THREE.DirectionalLight(0xffffff, 1.5);
    sunLight.position.set(5, 10, 7);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.set(2048, 2048);
    const fillLight = new THREE.DirectionalLight(0x8899ff, 0.4);
    fillLight.position.set(-5, 2, -5);
    scene.add(ambient, sunLight, fillLight);

    // ── Grid ──────────────────────────────────────────────────────
    const grid = new THREE.GridHelper(30, 60, 0x444466, 0x333355);
    grid.material.opacity = 0.4;
    grid.material.transparent = true;
    scene.add(grid);

    // ── Axes Helper (X: 빨강, Y: 초록, Z: 파랑) ───────────────────
    const axesHelper = new THREE.AxesHelper(1);
    axesHelper.visible = false;
    scene.add(axesHelper);

    function makeAxisLabel(text, color) {
      const canvas = document.createElement('canvas');
      canvas.width = 64; canvas.height = 64;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = color;
      ctx.font = 'bold 52px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, 32, 34);
      const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas), depthTest: false, transparent: true }));
      sprite.visible = false;
      scene.add(sprite);
      return sprite;
    }

    const xLabel = makeAxisLabel('X', '#ff5555');
    const yLabel = makeAxisLabel('Y', '#55ff55');
    const zLabel = makeAxisLabel('Z', '#5599ff');

    // ── Deform Uniforms ───────────────────────────────────────────
    const uCrack     = { value: 0.0 };
    const uCollapse  = { value: 0.0 };
    const uSink      = { value: 0.0 };
    const uShake     = { value: 0.0 };
    const uTime      = { value: 0.0 };
    const uModelH    = { value: 2.0 };
    const uModelMinY = { value: 0.0 };
    const uDissolve  = { value: 0.0 };  // 모서리부터 사라지는 dissolve (0–1)
    const uDarken    = { value: 0.0 };  // 색상 어두워짐 (0–1)

    function injectDeform(mat) {
      mat.onBeforeCompile = (shader) => {
        // ── Uniforms ──
        shader.uniforms.uCrack     = uCrack;
        shader.uniforms.uCollapse  = uCollapse;
        shader.uniforms.uSink      = uSink;
        shader.uniforms.uShake     = uShake;
        shader.uniforms.uTime      = uTime;
        shader.uniforms.uModelH    = uModelH;
        shader.uniforms.uModelMinY = uModelMinY;
        shader.uniforms.uDissolve  = uDissolve;
        shader.uniforms.uDarken    = uDarken;

        // ── Vertex Shader: 변형 + vWorldPos 전달 ──
        shader.vertexShader =
          `varying vec3 vWorldPos;
uniform float uCrack;
uniform float uCollapse;
uniform float uSink;
uniform float uShake;
uniform float uTime;
uniform float uModelH;
uniform float uModelMinY;\n` +
          shader.vertexShader.replace(
            '#include <begin_vertex>',
            `#include <begin_vertex>
            // 원본 월드 포지션 (dissolve 용 — 변형 전)
            vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;

            float ht = clamp((transformed.y - uModelMinY) / max(uModelH, 0.001), 0.0, 1.0);

            // ── 균열: 블록 단위 해시 노이즈 ──
            float crackAmt = uCrack * 0.0018 * uModelH;
            vec3 qp = floor(transformed * (6.0 / max(uModelH, 0.001)));
            float hx = fract(sin(dot(qp, vec3(127.1, 311.7,  74.7))) * 43758.5);
            float hy = fract(sin(dot(qp, vec3(269.5, 183.3, 246.1))) * 43758.5);
            float hz = fract(sin(dot(qp, vec3( 42.1, 526.4, 190.3))) * 43758.5);
            transformed += (vec3(hx, hy, hz) * 2.0 - 1.0) * crackAmt * (0.3 + ht * 0.7);

            // ── 붕괴: 하중점 기반 구조 실패 + 층 압축 ──
            float failHt    = 0.25;
            float aboveFail = max(0.0, ht - failHt) / max(1.0 - failHt, 0.001);
            float cn = uCollapse / 100.0;
            transformed.x += cn * 0.55 * aboveFail * aboveFail * uModelH;
            transformed.y -= cn * 0.22 * ht * ht * uModelH;
            transformed.z += cn * 0.07 * sin(ht * 6.28318) * uModelH;

            // ── 침하: 기초 침하 ──
            float sn = uSink / 100.0;
            transformed.y -= sn * 0.18 * uModelH * (1.0 - ht * 0.5);

            // ── 지진 진동 ──
            float shakeAmp = uShake * cn * 0.045 * uModelH;
            transformed.x += sin(uTime * 15.0 + ht * 4.0) * shakeAmp;
            transformed.z += cos(uTime * 13.0 + ht * 3.5) * shakeAmp * 0.6;`
          );

        // ── Fragment Shader: 노화 색상 (조명 전) + dissolve ──
        shader.fragmentShader =
          `varying vec3 vWorldPos;
uniform float uDissolve;
uniform float uDarken;

float _h(vec3 p) {
  p = fract(p * vec3(127.1, 311.7, 74.7));
  p += dot(p, p.yzx + 19.19);
  return fract((p.x + p.y) * p.z);
}
float _sn(vec3 p) {
  vec3 i = floor(p); vec3 f = fract(p);
  vec3 u = f * f * (3.0 - 2.0 * f);
  return mix(mix(mix(_h(i),             _h(i+vec3(1,0,0)), u.x),
                 mix(_h(i+vec3(0,1,0)), _h(i+vec3(1,1,0)), u.x), u.y),
             mix(mix(_h(i+vec3(0,0,1)), _h(i+vec3(1,0,1)), u.x),
                 mix(_h(i+vec3(0,1,1)), _h(i+vec3(1,1,1)), u.x), u.y), u.z);
}
float _fbm(vec3 p) {
  return _sn(p)*0.500 + _sn(p*2.03)*0.250 + _sn(p*4.11)*0.125 + _sn(p*8.17)*0.0625;
}\n` +
          shader.fragmentShader
            // ── 노화: 조명 계산 전 diffuseColor 수정 → 씬 조명을 자연스럽게 받음
            .replace(
              '#include <map_fragment>',
              `#include <map_fragment>
              float _ap = _fbm(vWorldPos * 2.2 + vec3(3.7, 1.2, 5.3));
              // 1. 어두워짐
              diffuseColor.rgb *= (1.0 - uDarken * 0.55);
              // 2. 녹·이끼 색조 (linear 공간 — 조명 적용 전)
              vec3 _agRust = vec3(0.38, 0.14, 0.02);
              vec3 _agMold = vec3(0.04, 0.18, 0.03);
              vec3 _agCol  = mix(_agRust, _agMold, _ap);
              float _agMix = clamp(uDarken * (_ap * 0.7 + 0.3) * 0.70, 0.0, 1.0);
              diffuseColor.rgb = mix(diffuseColor.rgb, _agCol, _agMix);
              // 3. 흠집 — 밝은 콘크리트 노출면
              float _scrN = _fbm(vWorldPos * 5.5 + vec3(5.1, 3.3, 1.7));
              float _scrM = smoothstep(0.60, 0.42, _scrN) * clamp(uDarken * 3.5, 0.0, 1.0);
              _scrM *= smoothstep(0.65, 0.0, uDissolve);
              diffuseColor.rgb = mix(diffuseColor.rgb, vec3(0.52, 0.46, 0.35), _scrM * 0.65);`
            )
            // ── dissolve: FBM 기반 소실
            .replace(
              '#include <clipping_planes_fragment>',
              `#include <clipping_planes_fragment>
              float _dn  = _fbm(vWorldPos * 1.5);
              float _thr = uDissolve;
              float _eb  = smoothstep(_thr, _thr + 0.08, _dn);
              if (_dn < _thr) discard;`
            )
            // ── 소실 경계 탄화 테두리
            .replace(
              '#include <tonemapping_fragment>',
              `#include <tonemapping_fragment>
              gl_FragColor.rgb = mix(vec3(0.04, 0.02, 0.01), gl_FragColor.rgb, _eb);`
            );
      };
      mat.needsUpdate = true;
    }

    // ── GLB Loader ────────────────────────────────────────────────
    const loader = new GLTFLoader();
    let currentModel = null;
    let initCamPos = null, initCamTarget = null;
    let worldModelH = 2.0;
    let meshMaterials = []; // 재질 원본 속성 저장 (노화 효과용)

    function placeModel(gltf) {
      if (currentModel) { scene.remove(currentModel); currentModel = null; window._mixer = null; }
      meshMaterials = [];
      const model = gltf.scene;
      currentModel = model;

      model.traverse(child => {
        if (!child.isMesh) return;
        child.castShadow = true;
        child.receiveShadow = true;
        (Array.isArray(child.material) ? child.material : [child.material])
          .forEach(mat => {
            injectDeform(mat);
            meshMaterials.push({ mat, origRoughness: mat.roughness ?? 0.5 });
          });
      });

      const box    = new THREE.Box3().setFromObject(model);
      const size   = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const scale  = 2.0 / Math.max(size.x, size.y, size.z);
      model.scale.setScalar(scale);
      model.position.set(-center.x * scale, -box.min.y * scale, -center.z * scale);

      uModelMinY.value = box.min.y;
      uModelH.value    = size.y;
      worldModelH      = size.y * scale;
      scene.add(model);

      // 모델 오른쪽 옆에 축 표시
      const axisOffset = size.x * scale / 2 + 0.5;
      const axisScale  = Math.max(0.4, worldModelH * 0.45);
      axesHelper.position.set(axisOffset, 0, 0);
      axesHelper.scale.setScalar(axisScale);
      axesHelper.visible = true;

      const ls = axisScale * 0.22; // 레이블 스프라이트 크기
      const lp = axisScale * 1.22; // 축 끝 + 여백
      xLabel.position.set(axisOffset + lp, 0,  0); xLabel.scale.set(ls, ls, 1); xLabel.visible = true;
      yLabel.position.set(axisOffset,  lp, 0); yLabel.scale.set(ls, ls, 1); yLabel.visible = true;
      zLabel.position.set(axisOffset,  0,  lp); zLabel.scale.set(ls, ls, 1); zLabel.visible = true;

      const h = worldModelH;
      initCamPos    = new THREE.Vector3(0, h * 0.8, h * 2.8);
      initCamTarget = new THREE.Vector3(0, h * 0.4, 0);
      camera.position.copy(initCamPos);
      controls.target.copy(initCamTarget);
      controls.update();

      if (gltf.animations?.length) {
        const mixer = new THREE.AnimationMixer(model);
        gltf.animations.forEach(c => mixer.clipAction(c).play());
        window._mixer = mixer;
      }
      document.getElementById('loading').style.display = 'none';
    }

    function loadGLB(src) {
      document.getElementById('loading-text').textContent = 'Loading...';
      document.getElementById('sample-btn').style.display = 'none';
      document.getElementById('file-btn').style.display = 'none';
      loader.load(src, placeModel,
        p => { if (p.total > 0) document.getElementById('loading-text').textContent = `Loading... ${Math.round(p.loaded/p.total*100)}%`; },
        err => {
          console.error(err);
          document.getElementById('loading-text').textContent = '불러오기 실패. 다시 시도해주세요.';
          document.getElementById('sample-btn').style.display = 'inline-block';
          document.getElementById('file-btn').style.display = 'inline-block';
        }
      );
    }

    function loadFromFile(file) { const r = new FileReader(); r.onload = e => loadGLB(e.target.result); r.readAsDataURL(file); }
    document.getElementById('file-btn').onclick    = () => document.getElementById('file-input').click();
    document.getElementById('file-input').onchange = e  => { if (e.target.files[0]) loadFromFile(e.target.files[0]); };
    const overlay = document.getElementById('drop-overlay');
    document.addEventListener('dragover',  e => { e.preventDefault(); overlay.style.display = 'block'; });
    document.addEventListener('dragleave', e => { if (!e.relatedTarget) overlay.style.display = 'none'; });
    document.addEventListener('drop', e => {
      e.preventDefault(); overlay.style.display = 'none';
      const f = e.dataTransfer.files[0];
      if (f && (f.name.endsWith('.glb') || f.name.endsWith('.gltf'))) loadFromFile(f);
    });

    // ── Particles ─────────────────────────────────────────────────
    const RANGE = 14, CEIL = 12;
    let weatherType = 'none', intensity = 0.5;

    // 비
    const RAIN_N = 4000;
    const rPos = new Float32Array(RAIN_N * 3), rSpd = new Float32Array(RAIN_N);
    for (let i = 0; i < RAIN_N; i++) {
      rPos[i*3]   = (Math.random()-0.5)*RANGE*2;
      rPos[i*3+1] = Math.random()*CEIL;
      rPos[i*3+2] = (Math.random()-0.5)*RANGE*2;
      rSpd[i] = 0.06 + Math.random()*0.1;
    }
    const rainGeo  = new THREE.BufferGeometry();
    rainGeo.setAttribute('position', new THREE.BufferAttribute(rPos, 3));
    const rainMat  = new THREE.PointsMaterial({ color: 0xaaddff, size: 0.05, transparent: true, opacity: 0.55, depthWrite: false });
    const rainMesh = new THREE.Points(rainGeo, rainMat);
    rainMesh.visible = false;
    scene.add(rainMesh);

    // 강풍 먼지
    const WIND_N = 2000;
    const wPos = new Float32Array(WIND_N * 3), wSpd = new Float32Array(WIND_N), wPhs = new Float32Array(WIND_N);
    for (let i = 0; i < WIND_N; i++) {
      wPos[i*3]   = (Math.random()-0.5)*RANGE*2;
      wPos[i*3+1] = Math.random()*CEIL*0.55;
      wPos[i*3+2] = (Math.random()-0.5)*RANGE*2;
      wSpd[i] = 0.04 + Math.random()*0.08;
      wPhs[i] = Math.random()*Math.PI*2;
    }
    const windGeo  = new THREE.BufferGeometry();
    windGeo.setAttribute('position', new THREE.BufferAttribute(wPos, 3));
    const windMat  = new THREE.PointsMaterial({ color: 0xd4b07a, size: 0.08, transparent: true, opacity: 0.5, depthWrite: false });
    const windMesh = new THREE.Points(windGeo, windMat);
    windMesh.visible = false;
    scene.add(windMesh);

    // 지진 지면 먼지
    const QDUST_N = 1500;
    const qdPos = new Float32Array(QDUST_N * 3);
    const qdVx  = new Float32Array(QDUST_N);
    const qdVy  = new Float32Array(QDUST_N);
    const qdPhs = new Float32Array(QDUST_N);
    for (let i = 0; i < QDUST_N; i++) {
      qdPos[i*3]   = (Math.random()-0.5)*8;
      qdPos[i*3+1] = Math.random()*0.5;
      qdPos[i*3+2] = (Math.random()-0.5)*8;
      qdVx[i]  = (Math.random()-0.5)*0.03;
      qdVy[i]  = 0.008 + Math.random()*0.025;
      qdPhs[i] = Math.random()*Math.PI*2;
    }
    const qdustGeo  = new THREE.BufferGeometry();
    qdustGeo.setAttribute('position', new THREE.BufferAttribute(qdPos, 3));
    const qdustMat  = new THREE.PointsMaterial({ color: 0xaa9977, size: 0.10, transparent: true, opacity: 0.6, depthWrite: false });
    const qdustMesh = new THREE.Points(qdustGeo, qdustMat);
    qdustMesh.visible = false;
    scene.add(qdustMesh);

    function tickParticles() {
      const hasRain  = weatherType === 'rain';
      const hasWind  = weatherType === 'wind';
      const hasQuake = weatherType === 'quake';
      const sp = intensity, t = performance.now()*0.001;

      rainMesh.visible  = hasRain;
      windMesh.visible  = hasWind;
      qdustMesh.visible = hasQuake;

      if (hasRain) {
        for (let i = 0; i < RAIN_N; i++) {
          rPos[i*3+1] -= rSpd[i] * (sp*1.6 + 0.4);
          if (rPos[i*3+1] < -0.3) {
            rPos[i*3]   = (Math.random()-0.5)*RANGE*2;
            rPos[i*3+1] = CEIL + Math.random()*2;
            rPos[i*3+2] = (Math.random()-0.5)*RANGE*2;
          }
        }
        rainGeo.attributes.position.needsUpdate = true;
        rainMat.opacity = 0.3 + sp*0.45;
      }

      if (hasWind) {
        for (let i = 0; i < WIND_N; i++) {
          wPos[i*3]   += wSpd[i] * (sp*1.6 + 0.3);
          wPos[i*3+1] += Math.sin(t*1.2 + wPhs[i]) * 0.015 * sp;
          if (wPos[i*3] > RANGE) {
            wPos[i*3]   = -RANGE;
            wPos[i*3+1] = Math.random()*CEIL*0.55;
            wPos[i*3+2] = (Math.random()-0.5)*RANGE*2;
          }
        }
        windGeo.attributes.position.needsUpdate = true;
        windMat.opacity = 0.3 + sp*0.4;
      }

      if (hasQuake) {
        for (let i = 0; i < QDUST_N; i++) {
          qdPos[i*3]   += qdVx[i] + Math.sin(t*6 + qdPhs[i]) * 0.008 * sp;
          qdPos[i*3+1] += qdVy[i] * sp;
          if (qdPos[i*3+1] > 3.0) {
            qdPos[i*3]   = (Math.random()-0.5)*8;
            qdPos[i*3+1] = 0;
            qdPos[i*3+2] = (Math.random()-0.5)*8;
          }
        }
        qdustGeo.attributes.position.needsUpdate = true;
        qdustMat.opacity = 0.3 + sp*0.5;
      }
    }

    // ── Auto Deform Targets ───────────────────────────────────────
    function calcAutoTargets() {
      const sp = intensity;
      let crack = 0, collapse = 0, sink = 0;
      if (weatherType === 'rain')  { crack += sp * 45; sink   += sp * 22; }
      if (weatherType === 'wind')  { collapse += sp * 65; crack += sp * 20; }
      if (weatherType === 'quake') { crack += sp * 75; collapse += sp * 80; sink += sp * 55; }
      return {
        crack:    Math.min(crack,    100),
        collapse: Math.min(collapse, 100),
        sink:     Math.min(sink,     100),
      };
    }

    // ── Atmosphere ────────────────────────────────────────────────
    const clearBg = new THREE.Color(0x1a1a2e);
    const stormBg = new THREE.Color(0x07070f);
    const quakeBg = new THREE.Color(0x100808);

    function updateAtmosphere() {
      const stormy   = weatherType !== 'none';
      const isQuake  = weatherType === 'quake';
      const targetBg = isQuake ? quakeBg : (stormy ? stormBg : clearBg);
      scene.background.lerp(targetBg, 0.03);
      scene.fog.color.lerp(targetBg, 0.03);
      scene.fog.density  = THREE.MathUtils.lerp(scene.fog.density,  stormy ? 0.038 : 0.018, 0.03);
      sunLight.intensity = THREE.MathUtils.lerp(sunLight.intensity, stormy ? 0.50  : 1.5,   0.04);
      ambient.intensity  = THREE.MathUtils.lerp(ambient.intensity,  stormy ? 0.20  : 0.6,   0.04);
    }

    // ── UI References ─────────────────────────────────────────────
    const crackChk     = document.getElementById('crack-chk');
    const collapseChk  = document.getElementById('collapse-chk');
    const sinkChk      = document.getElementById('sink-chk');
    const ageChk       = document.getElementById('age-chk');
    const crackInput   = document.getElementById('crack-val');
    const collapseInput = document.getElementById('collapse-val');
    const sinkInput    = document.getElementById('sink-val');
    const ageInput     = document.getElementById('age-val');
    const crackAuto    = document.getElementById('crack-auto');
    const collapseAuto = document.getElementById('collapse-auto');
    const sinkAuto     = document.getElementById('sink-auto');
    const ageAuto      = document.getElementById('age-auto');
    const intensitySlider = document.getElementById('intensity');

    // 노화 누적값 (0–100)
    let age = 0;

    // ── 시뮬레이션 상태 ──────────────────────────────────────────
    let simElapsed  = 0;      // 현재 경과 시간 (초)
    let simDuration = 30;     // 총 진행 시간 (초)
    let simPlaying   = false;
    let simCompleted = false;  // 시뮬레이션 완료 후 값 고정 플래그

    const simPlayBtn  = document.getElementById('sim-play-btn');
    const simResetBtn = document.getElementById('sim-reset-btn');
    const simDurInput = document.getElementById('sim-duration');
    const simProgressBar  = document.getElementById('sim-progress-bar');
    const simTimeCur  = document.getElementById('sim-time-cur');
    const simTimeTotal = document.getElementById('sim-time-total');

    function simGetTargets() {
      return {
        crack:    Math.min(1000, Math.max(0, parseFloat(document.getElementById('sim-crack-target').value)    || 0)),
        collapse: Math.min(1000, Math.max(0, parseFloat(document.getElementById('sim-collapse-target').value) || 0)),
        sink:     Math.min(1000, Math.max(0, parseFloat(document.getElementById('sim-sink-target').value)     || 0)),
        age:      Math.min(1000, Math.max(0, parseFloat(document.getElementById('sim-age-target').value)      || 0)),
      };
    }

    function simSetProgress(p) {
      // ease-in-out cubic
      const e = p < 0.5 ? 4*p*p*p : 1 - Math.pow(-2*p+2, 3)/2;
      const tgt = simGetTargets();
      uCrack.value    = tgt.crack    * e; crackInput.value    = Math.round(uCrack.value);
      uCollapse.value = tgt.collapse * e; collapseInput.value = Math.round(uCollapse.value);
      uSink.value     = tgt.sink     * e; sinkInput.value     = Math.round(uSink.value);
      age = tgt.age * e; applyAge(age); ageInput.value = Math.round(age);
      uShake.value = weatherType === 'quake' ? intensity * e : 0;
    }

    function simUpdateUI() {
      const p = simDuration > 0 ? Math.min(simElapsed / simDuration, 1) : 0;
      simProgressBar.style.width = (p * 100).toFixed(1) + '%';
      simTimeCur.textContent  = Math.floor(simElapsed);
      simTimeTotal.textContent = simDuration;
    }

    function simReset() {
      simElapsed = 0; simPlaying = false; simCompleted = false;
      simPlayBtn.textContent = '▶ 재생';
      simPlayBtn.classList.remove('playing');
      simSetProgress(0);
      simUpdateUI();
    }

    // ── 모드 토글 ─────────────────────────────────────────────────
    document.getElementById('tab-manual').addEventListener('click', () => {
      document.getElementById('tab-manual').classList.add('active');
      document.getElementById('tab-sim').classList.remove('active');
      document.getElementById('panel-manual').style.display = '';
      document.getElementById('panel-sim').style.display = 'none';
      if (simPlaying) { simPlaying = false; simPlayBtn.textContent = '▶ 재생'; simPlayBtn.classList.remove('playing'); }
    });
    document.getElementById('tab-sim').addEventListener('click', () => {
      document.getElementById('tab-sim').classList.add('active');
      document.getElementById('tab-manual').classList.remove('active');
      document.getElementById('panel-sim').style.display = '';
      document.getElementById('panel-manual').style.display = 'none';
    });

    simPlayBtn.addEventListener('click', () => {
      if (simCompleted) { simReset(); return; } // 완료 상태에서 클릭 → 리셋
      if (simElapsed >= simDuration) simElapsed = 0;
      simPlaying = !simPlaying;
      simPlayBtn.textContent = simPlaying ? '⏸ 일시정지' : '▶ 재생';
      simPlayBtn.classList.toggle('playing', simPlaying);
    });

    simResetBtn.addEventListener('click', simReset);

    simDurInput.addEventListener('change', () => {
      simDuration = Math.max(1, parseInt(simDurInput.value) || 30);
      simDurInput.value = simDuration;
      simUpdateUI();
    });

    // ── UI Events ─────────────────────────────────────────────────
    document.querySelectorAll('input[name="weather"]').forEach(r =>
      r.addEventListener('change', e => { weatherType = e.target.value; })
    );

    intensitySlider.addEventListener('input', e => {
      intensity = e.target.value / 100;
      document.getElementById('intensity-val').textContent = e.target.value;
    });

    function setupManual(chk, input, auto, uVal) {
      chk.addEventListener('change', () => {
        const manual = chk.checked;
        input.disabled = !manual;
        auto.style.display = manual ? 'none' : 'inline';
        if (manual) { input.value = Math.round(uVal.value * 100); }
      });
      input.addEventListener('input', () => {
        if (chk.checked) uVal.value = (parseFloat(input.value) || 0) / 100;
      });
    }

    setupManual(crackChk,    crackInput,    crackAuto,    { get value() { return uCrack.value / 100; }, set value(v) { uCrack.value = v * 100; } });
    setupManual(collapseChk, collapseInput, collapseAuto, { get value() { return uCollapse.value / 100; }, set value(v) { uCollapse.value = v * 100; } });
    setupManual(sinkChk,     sinkInput,     sinkAuto,     { get value() { return uSink.value / 100; }, set value(v) { uSink.value = v * 100; } });

    // 노화 수동 제어 (0–100 → uDissolve 0–0.9, uDarken 0–1)
    ageChk.addEventListener('change', () => {
      const manual = ageChk.checked;
      ageInput.disabled = !manual;
      ageAuto.style.display = manual ? 'none' : 'inline';
      if (manual) ageInput.value = Math.round(age);
    });
    ageInput.addEventListener('input', () => {
      if (ageChk.checked) {
        age = Math.max(0, Math.min(1000, parseFloat(ageInput.value) || 0));
        applyAge(age);
      }
    });

    function applyAge(a) {
      const n = a / 1000;                           // 0–1
      // 어두워짐: 처음부터 진행
      uDarken.value = Math.min(1.0, n * 1.2);
      // 소실: 40% 이후 시작, 나머지 60% 구간에서 0→0.9 진행
      const dissolveN = Math.max(0, (n - 0.4) / 0.6);
      uDissolve.value = dissolveN * 0.9;
    }

    // ── 재질 속성: roughness만 조정 (색상은 shader diffuseColor로 처리) ──
    function updateAgeMaterials() {
      const d = uDarken.value; // 0–1
      meshMaterials.forEach(({ mat, origRoughness }) => {
        mat.roughness = Math.min(1.0, origRoughness + d * 0.45);
      });
    }

    // ── Reset ─────────────────────────────────────────────────────
    document.getElementById('reset-btn').addEventListener('click', () => {
      document.querySelector('input[name="weather"][value="none"]').checked = true;
      weatherType = 'none';
      intensitySlider.value = 50; intensity = 0.5;
      document.getElementById('intensity-val').textContent = '50';

      [[crackChk, crackInput, crackAuto], [collapseChk, collapseInput, collapseAuto],
       [sinkChk, sinkInput, sinkAuto], [ageChk, ageInput, ageAuto]]
        .forEach(([chk, inp, aut]) => { chk.checked = false; inp.disabled = true; inp.value = 0; aut.style.display = 'none'; });

      uCrack.value = 0; uCollapse.value = 0; uSink.value = 0;
      uShake.value = 0; uDissolve.value = 0; uDarken.value = 0;
      age = 0;
      simReset();

      if (initCamPos) { camera.position.copy(initCamPos); controls.target.copy(initCamTarget); controls.update(); }
    });

    // ── Resize ────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    // ── Render Loop ───────────────────────────────────────────────
    const clock = new THREE.Clock();

    // 날씨별 노화 속도 (units/sec at intensity=1)
    const AGE_RATE = { none: 0, rain: 3, wind: 4, quake: 7 };

    (function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();
      if (window._mixer) window._mixer.update(dt);
      controls.update();
      uTime.value += dt;
      tickParticles();
      updateAtmosphere();
      updateAgeMaterials();

      if (simPlaying) {
        // ── 시뮬레이션 모드: 경과 시간 기반으로 효과 진행 ──
        simElapsed = Math.min(simElapsed + dt, simDuration);
        const p = simElapsed / simDuration;
        simSetProgress(p);
        simUpdateUI();
        if (simElapsed >= simDuration) {
          simPlaying = false;
          simCompleted = true;
          simPlayBtn.textContent = '✓ 완료';
          simPlayBtn.classList.remove('playing');
        }
      } else if (!simCompleted) {
        // ── 일반 모드: 날씨 강도 자동 lerp ──
        const tgt = calcAutoTargets();
        function autoLerp(chk, inp, aut, uVal, target, speed) {
          if (chk.checked) {
            uVal.value = Math.max(0, Math.min(1000, uVal.value));
          } else {
            uVal.value = THREE.MathUtils.lerp(uVal.value, target, speed);
            inp.value  = Math.round(uVal.value);
            aut.style.display = weatherType !== 'none' ? 'inline' : 'none';
          }
        }
        autoLerp(crackChk,    crackInput,    crackAuto,    uCrack,    tgt.crack,    0.020);
        autoLerp(collapseChk, collapseInput, collapseAuto, uCollapse, tgt.collapse, 0.015);
        autoLerp(sinkChk,     sinkInput,     sinkAuto,     uSink,     tgt.sink,     0.015);

        uShake.value = THREE.MathUtils.lerp(uShake.value, weatherType === 'quake' ? intensity : 0, 0.05);

        // 노화: 시간에 따라 누적
        if (!ageChk.checked) {
          const rate = (AGE_RATE[weatherType] || 0) * intensity;
          age = Math.min(1000, age + rate * dt);
          applyAge(age);
          ageInput.value = Math.round(age);
          ageAuto.style.display = weatherType !== 'none' ? 'inline' : 'none';
        }
      }

      renderer.render(scene, camera);
    })();
  </script>
</body>
</html>
